name: Build Desktop App

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: build:win
            artifact: '*.exe'
          - os: macos-latest
            cmd: build:mac
            artifact: '*.dmg'
          - os: ubuntu-latest
            cmd: build:linux
            artifact: '*.AppImage'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            node/package-lock.json
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install node backend deps
        run: cd node && npm ci

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install desktop deps
        run: cd desktop && npm ci

      - name: Build desktop (${{ matrix.os }})
        run: cd desktop && npm run ${{ matrix.cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibeport-${{ matrix.os }}
          path: desktop/dist/${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          name: "Vibeport Desktop ${{ github.ref_name }}"
          body: |
            ## Download Vibeport Desktop

            | Platform | File |
            |----------|------|
            | Windows  | `.exe` installer |
            | macOS    | `.dmg` disk image |
            | Linux    | `.AppImage` (portable) |

            **Requires Node.js 20+** — [nodejs.org](https://nodejs.org)

            After installing, double-click Vibeport and your node starts automatically.
