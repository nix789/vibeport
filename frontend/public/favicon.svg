<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Black background -->
  <rect width="48" height="48" fill="#000"/>

  <!-- Red V — most offset (bottom layer) -->
  <path d="M5 6 L24 42 L43 6" fill="none" stroke="#ff0000" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"
        transform="translate(3.5, 2)"/>

  <!-- Blue V — mid offset -->
  <path d="M5 6 L24 42 L43 6" fill="none" stroke="#0000ff" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"
        transform="translate(1.8, 1)"/>

  <!-- Green V — top layer, no offset -->
  <path d="M5 6 L24 42 L43 6" fill="none" stroke="#00ff00" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
