<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,255,0,0.015)"/>
    </pattern>
    <linearGradient id="div-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00ff00" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#00ff00" stop-opacity="0.3"/>
      <stop offset="60%"  stop-color="#00ff00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff00" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#000"/>
  <rect width="1500" height="500" fill="url(#scanlines)"/>

  <!-- Logo PNG embedded (left side) -->
  <image href="/logo.png" x="20" y="20" width="460" height="460"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Divider -->
  <line x1="510" y1="0" x2="510" y2="500" stroke="url(#div-grad)" stroke-width="1"/>

  <!-- VIBEPORT heading -->
  <text x="550" y="220"
        font-family="monospace, 'Courier New', Courier"
        font-size="148" font-weight="bold" letter-spacing="10"
        fill="#00ff00">
    VIBEPORT
  </text>

  <!-- Tagline -->
  <text x="552" y="285"
        font-family="monospace, 'Courier New', Courier"
        font-size="28" letter-spacing="6"
        fill="#004400">
    your port · your vibe · your people
  </text>

  <!-- Feature pills -->
  <rect x="552" y="328" width="148" height="34" rx="2" fill="none" stroke="#003300" stroke-width="1"/>
  <text x="626" y="351" font-family="monospace" font-size="16" letter-spacing="3"
        text-anchor="middle" fill="#004400">no ads</text>

  <rect x="714" y="328" width="196" height="34" rx="2" fill="none" stroke="#003300" stroke-width="1"/>
  <text x="812" y="351" font-family="monospace" font-size="16" letter-spacing="3"
        text-anchor="middle" fill="#004400">no algorithm</text>

  <rect x="924" y="328" width="196" height="34" rx="2" fill="none" stroke="#003300" stroke-width="1"/>
  <text x="1022" y="351" font-family="monospace" font-size="16" letter-spacing="3"
        text-anchor="middle" fill="#004400">your data</text>

  <!-- URL -->
  <text x="552" y="430"
        font-family="monospace, 'Courier New', Courier"
        font-size="22" letter-spacing="4"
        fill="#003300">
    vibeport.nixdata.net
  </text>

  <!-- Corner marks -->
  <line x1="16" y1="16" x2="48" y2="16" stroke="#003300" stroke-width="1.5"/>
  <line x1="16" y1="16" x2="16" y2="48" stroke="#003300" stroke-width="1.5"/>
  <line x1="1484" y1="16" x2="1452" y2="16" stroke="#003300" stroke-width="1.5"/>
  <line x1="1484" y1="16" x2="1484" y2="48" stroke="#003300" stroke-width="1.5"/>
  <line x1="16" y1="484" x2="48" y2="484" stroke="#003300" stroke-width="1.5"/>
  <line x1="16" y1="484" x2="16" y2="452" stroke="#003300" stroke-width="1.5"/>
  <line x1="1484" y1="484" x2="1452" y2="484" stroke="#003300" stroke-width="1.5"/>
  <line x1="1484" y1="484" x2="1484" y2="452" stroke="#003300" stroke-width="1.5"/>
</svg>
